name: Pull Request Validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate local installation
        run: npm run test:install

      - name: Validate local execution
        run: npm run test:execution

      - name: Validate offline behavior
        run: npm run test:offline

      - name: Validate uninstall behavior
        run: npm run test:uninstall

      - name: Validate rollback behavior
        run: npm run test:rollback
